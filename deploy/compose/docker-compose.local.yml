# Override local opcional.
# Mantiene puertos clásicos 5433, 6379, 8000, 5173, 3000, 5555 vía deploy/env/compose.local.env.
# Úsalo si quieres añadir ajustes solo de desarrollo sin tocar docker-compose.yml.

services:
  backend-fastapi:
    user: "0:0"

  celery-worker:
    user: "0:0"

  celery-beat:
    user: "0:0"

  adminer:
    image: adminer:latest
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${ADMINER_HOST_PORT:-8081}:8080"